version: v2
plugins:
  - local: protoc-gen-go
    out: api/daemonpb
    opt:
      - paths=source_relative
    types:
      - agentgate.**
  - local: protoc-gen-go-grpc
    out: api/daemonpb
    opt:
      - paths=source_relative
    types:
      - agentgate.**
  - local: protoc-gen-go
    out: api
    opt:
      - paths=source_relative
    types:
      - inference.v1.**
  - local: protoc-gen-go-grpc
    out: api
    opt:
      - paths=source_relative
    types:
      - inference.v1.**
