syntax = "proto3";

package agentgate;

option go_package = "goodkind.io/agent-gate/api/daemonpb";

// AgentGateD is the agent-gate daemon service.
// The claude wrapper and all hook processes connect here.
service AgentGateD {
  // AcquireSession is called by the claude wrapper before launching claude.
  // The daemon creates a fake HOME in XDG_RUNTIME_DIR, populates settings.json
  // with the session model injected, and returns the path.
  rpc AcquireSession(AcquireSessionRequest) returns (AcquireSessionResponse);

  // ReleaseSession is called by the claude wrapper after claude exits.
  // The daemon cleans up the fake HOME and any associated runtime state.
  rpc ReleaseSession(ReleaseSessionRequest) returns (ReleaseSessionResponse);

  // HookEvent forwards a Claude Code hook event to the daemon for processing.
  // Replaces direct stdin-based hook handling for wrapper-launched sessions.
  rpc HookEvent(HookEventRequest) returns (HookEventResponse);
}

message AcquireSessionRequest {
  // session_name is the agent-gate session name (e.g. "my-feature").
  // Empty for sessions not managed by agent-gate (bare claude invocations).
  string session_name = 1;

  // wrapper_id is a unique ID for this wrapper process (e.g. PID as string).
  string wrapper_id = 2;
}

message AcquireSessionResponse {
  // fake_home is the path to the per-process fake HOME directory.
  // The wrapper launches claude with HOME=fake_home.
  string fake_home = 1;

  // real_claude is the path to the actual claude binary.
  string real_claude = 2;

  // model is the resolved model for this session (from session metadata or global default).
  string model = 3;

  // settings_file is the path to the per-session settings.json (for --settings flag).
  // Lives inside fake_home/.claude/settings.json.
  string settings_file = 4;
}

message ReleaseSessionRequest {
  string wrapper_id = 1;
}

message ReleaseSessionResponse {}

message HookEventRequest {
  // raw_json is the raw JSON payload from Claude Code (stdin of hook process).
  bytes raw_json = 1;

  // wrapper_id identifies which wrapper session this hook belongs to.
  // The daemon uses this to look up session context.
  string wrapper_id = 2;
}

message HookEventResponse {
  // exit_code is the code the hook process should exit with.
  // 0 = allow, 2 = block.
  int32 exit_code = 1;

  // stdout_data is written to hook process stdout (injected into Claude context).
  bytes stdout_data = 2;

  // stderr_data is written to hook process stderr.
  bytes stderr_data = 3;
}
