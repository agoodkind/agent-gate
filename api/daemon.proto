syntax = "proto3";

package agentgate;

option go_package = "goodkind.io/agent-gate/api/daemonpb";

// AgentGateD is the agent-gate daemon service.
// Hook processes connect here for daemon-owned enforcement.
service AgentGateD {
  // ResolveHookEnvironment returns command environment names needed by evaluation.
  rpc ResolveHookEnvironment(ResolveHookEnvironmentRequest) returns (ResolveHookEnvironmentResponse);

  // EvaluateHook forwards raw hook input to the daemon-owned enforcement engine.
  rpc EvaluateHook(EvaluateHookRequest) returns (EvaluateHookResponse);

  // Status returns process and build metadata for the connected daemon.
  rpc Status(StatusRequest) returns (StatusResponse);

  rpc KVGet(KVGetRequest) returns (KVGetResponse);
  rpc KVSet(KVSetRequest) returns (KVSetResponse);
  rpc KVDelete(KVDeleteRequest) returns (KVDeleteResponse);
  rpc KVExists(KVExistsRequest) returns (KVExistsResponse);
  rpc KVTTL(KVGetRequest) returns (KVTTLResponse);
  rpc KVPTTL(KVGetRequest) returns (KVPTTLResponse);
  rpc KVExpire(KVExpireRequest) returns (KVExpireResponse);
  rpc KVGetDelete(KVGetDeleteRequest) returns (KVGetDeleteResponse);
  rpc KVList(KVListRequest) returns (KVListResponse);
}

message ResolveHookEnvironmentRequest {
  bytes raw_json = 1;
  string provider_hint = 2;
  map<string, string> env_fingerprint = 3;
}

message ResolveHookEnvironmentResponse {
  repeated string referenced_names = 1;
}

message EvaluateHookRequest {
  // raw_json is the raw JSON payload read from hook stdin.
  bytes raw_json = 1;

  // provider_hint is a best-effort CLI/template hint such as "codex" or
  // "gemini". Daemon-side detection may override it based on env/payload.
  string provider_hint = 2;
  string cwd = 3;
  repeated string argv = 4;
  map<string, string> env_fingerprint = 5;
}

message EvaluateHookResponse {
  // exit_code is the code the hook process should exit with.
  // 0 = allow, 2 = block.
  int32 exit_code = 1;

  // stdout_data is written to hook process stdout.
  bytes stdout_data = 2;

  // stderr_data is written to hook process stderr.
  bytes stderr_data = 3;
}

message StatusRequest {}

message StatusResponse {
  int64 pid = 1;
  string executable_path = 2;
  string socket_path = 3;
  string version = 4;
  string commit = 5;
  string dirty = 6;
  string build_hash = 7;
}

message KVEntry {
  string namespace = 1;
  string key = 2;
  bytes value = 3;
  uint64 version = 4;
  int64 created_unix_nano = 5;
  int64 updated_unix_nano = 6;
  int64 expires_unix_nano = 7;
  int64 pttl_ms = 8;
}

message KVGetRequest {
  string namespace = 1;
  string key = 2;
}

message KVGetResponse {
  bool found = 1;
  KVEntry entry = 2;
}

message KVSetRequest {
  string namespace = 1;
  string key = 2;
  bytes value = 3;
  string mode = 4;
  int64 ttl_ms = 5;
}

message KVSetResponse {
  bool stored = 1;
  KVEntry entry = 2;
}

message KVDeleteRequest {
  string namespace = 1;
  string key = 2;
}

message KVDeleteResponse {
  bool deleted = 1;
}

message KVExistsRequest {
  string namespace = 1;
  string key = 2;
}

message KVExistsResponse {
  bool exists = 1;
}

message KVTTLResponse {
  int64 ttl = 1;
}

message KVPTTLResponse {
  int64 pttl = 1;
}

message KVExpireRequest {
  string namespace = 1;
  string key = 2;
  int64 ttl_ms = 3;
}

message KVExpireResponse {
  bool updated = 1;
}

message KVGetDeleteRequest {
  string namespace = 1;
  string key = 2;
}

message KVGetDeleteResponse {
  bool found = 1;
  KVEntry entry = 2;
}

message KVListRequest {
  string namespace = 1;
  string prefix = 2;
  int32 limit = 3;
  bool include_values = 4;
}

message KVListResponse {
  repeated KVEntry entries = 1;
}
