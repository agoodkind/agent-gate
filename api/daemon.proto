syntax = "proto3";

package agentgate;

option go_package = "goodkind.io/agent-gate/api/daemonpb";

// AgentGateD is the agent-gate daemon service.
// Hook processes connect here for daemon-owned enforcement.
service AgentGateD {
  // EvaluateHook forwards raw hook input to the daemon-owned enforcement engine.
  rpc EvaluateHook(EvaluateHookRequest) returns (EvaluateHookResponse);

  // Status returns process and build metadata for the connected daemon.
  rpc Status(StatusRequest) returns (StatusResponse);
}

message EvaluateHookRequest {
  // raw_json is the raw JSON payload read from hook stdin.
  bytes raw_json = 1;

  // provider_hint is a best-effort CLI/template hint such as "codex" or
  // "gemini". Daemon-side detection may override it based on env/payload.
  string provider_hint = 2;
  string cwd = 3;
  repeated string argv = 4;
  map<string, string> env_fingerprint = 5;
}

message EvaluateHookResponse {
  // exit_code is the code the hook process should exit with.
  // 0 = allow, 2 = block.
  int32 exit_code = 1;

  // stdout_data is written to hook process stdout.
  bytes stdout_data = 2;

  // stderr_data is written to hook process stderr.
  bytes stderr_data = 3;
}

message StatusRequest {}

message StatusResponse {
  int64 pid = 1;
  string executable_path = 2;
  string socket_path = 3;
  string version = 4;
  string commit = 5;
  string dirty = 6;
  string build_hash = 7;
}
