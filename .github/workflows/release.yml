name: Release

on:
  push:
    branches: [ main ]

concurrency:
  group: release
  cancel-in-progress: true

permissions:
  contents: write

env:
  CGO_ENABLED: "1"
  GOTOOLCHAIN: local

jobs:
  tag:
    name: Prepare tag
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - id: tag
        run: |
          TS=$(date -u +%Y%m%d%H%M)
          HEX=$(printf '%x' "$GITHUB_RUN_NUMBER")
          SHA=$(git rev-parse --short HEAD)
          TAG="${TS}-${HEX}-${SHA}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Release tag: $TAG"

  build:
    name: Build ${{ matrix.asset }}
    needs: tag
    strategy:
      fail-fast: false
      matrix:
        include:
          - asset: agent-gate_linux_amd64
            runner: ubuntu-24.04
            goos: linux
            goarch: amd64
          - asset: agent-gate_linux_arm64
            runner: ubuntu-24.04-arm
            goos: linux
            goarch: arm64
          - asset: agent-gate_darwin_amd64
            runner: macos-15-intel
            goos: darwin
            goarch: amd64
          - asset: agent-gate_darwin_arm64
            runner: macos-14
            goos: darwin
            goarch: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Install PCRE2 on Linux
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libpcre2-dev
      - name: Install PCRE2 on macOS
        if: runner.os == 'macOS'
        run: |
          if ! brew list pcre2 >/dev/null 2>&1; then
            brew install pcre2
          fi
      - name: Build, sign, notarize, and archive
        env:
          VERSION: ${{ needs.tag.outputs.tag }}
          TARGET_GOOS: ${{ matrix.goos }}
          TARGET_GOARCH: ${{ matrix.goarch }}
          ASSET: ${{ matrix.asset }}
          APPLE_CODESIGN_IDENTITY: ${{ secrets.APPLE_CODESIGN_IDENTITY }}
          APPLE_DEVELOPER_ID_CERT_BASE64: ${{ secrets.APPLE_DEVELOPER_ID_CERT_BASE64 }}
          APPLE_DEVELOPER_ID_CERT_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_CERT_PASSWORD }}
          APPLE_NOTARYTOOL_ISSUER_ID: ${{ secrets.APPLE_NOTARYTOOL_ISSUER_ID }}
          APPLE_NOTARYTOOL_KEY: ${{ secrets.APPLE_NOTARYTOOL_KEY }}
          APPLE_NOTARYTOOL_KEY_ID: ${{ secrets.APPLE_NOTARYTOOL_KEY_ID }}
        run: |
          COMMIT=$(git rev-parse --short HEAD)
          BUILD_TIME=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          mkdir -p "dist/$ASSET"
          if [[ "$TARGET_GOOS" = "$(go env GOOS)" && "$TARGET_GOARCH" = "$(go env GOARCH)" ]]; then
            GOOS="$TARGET_GOOS" GOARCH="$TARGET_GOARCH" go build \
              -ldflags "-s -w -X goodkind.io/agent-gate/internal/version.Commit=$COMMIT -X goodkind.io/agent-gate/internal/version.Version=$VERSION -X goodkind.io/agent-gate/internal/version.Dirty=false -X goodkind.io/gklog/version.Commit=$COMMIT -X goodkind.io/gklog/version.Dirty=false -X goodkind.io/gklog/version.BuildTime=$BUILD_TIME -X goodkind.io/gklog/version.BinHash=" \
              -o "dist/$ASSET/agent-gate" \
              ./cmd/agent-gate
          else
            echo "unexpected non-native target: $TARGET_GOOS/$TARGET_GOARCH on $(go env GOOS)/$(go env GOARCH)" >&2
            exit 1
          fi

          if [[ "$TARGET_GOOS" = "darwin" ]]; then
            required_secrets=(
              APPLE_CODESIGN_IDENTITY
              APPLE_DEVELOPER_ID_CERT_BASE64
              APPLE_DEVELOPER_ID_CERT_PASSWORD
              APPLE_NOTARYTOOL_ISSUER_ID
              APPLE_NOTARYTOOL_KEY
              APPLE_NOTARYTOOL_KEY_ID
            )
            for secret_name in "${required_secrets[@]}"; do
              if [[ -z "${!secret_name}" ]]; then
                echo "missing required secret: $secret_name" >&2
                exit 1
              fi
            done

            KEYCHAIN_PATH="$RUNNER_TEMP/agent-gate-signing.keychain-db"
            KEYCHAIN_PASSWORD=$(uuidgen)
            CERT_PATH="$RUNNER_TEMP/developer-id-application.p12"
            NOTARY_KEY_PATH="$RUNNER_TEMP/AuthKey_${APPLE_NOTARYTOOL_KEY_ID}.p8"
            export CERT_PATH

            python3 -c 'import base64, os, pathlib; pathlib.Path(os.environ["CERT_PATH"]).write_bytes(base64.b64decode(os.environ["APPLE_DEVELOPER_ID_CERT_BASE64"]))'
            printf '%s' "$APPLE_NOTARYTOOL_KEY" > "$NOTARY_KEY_PATH"
            chmod 600 "$CERT_PATH" "$NOTARY_KEY_PATH"

            security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
            security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
            security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
            security import "$CERT_PATH" -P "$APPLE_DEVELOPER_ID_CERT_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
            security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

            codesign --force \
              --sign "$APPLE_CODESIGN_IDENTITY" \
              --identifier "io.goodkind.agent-gate" \
              --options runtime \
              --timestamp \
              --entitlements packaging/macos/agent-gate.entitlements \
              "dist/$ASSET/agent-gate"
            codesign --verify --verbose=2 "dist/$ASSET/agent-gate"

            NOTARY_ZIP="$RUNNER_TEMP/$ASSET-notary.zip"
            ditto -c -k --keepParent "dist/$ASSET/agent-gate" "$NOTARY_ZIP"
            xcrun notarytool submit "$NOTARY_ZIP" \
              --key "$NOTARY_KEY_PATH" \
              --key-id "$APPLE_NOTARYTOOL_KEY_ID" \
              --issuer "$APPLE_NOTARYTOOL_ISSUER_ID" \
              --wait
          fi

          chmod 0755 "dist/$ASSET/agent-gate"
          cp README.md "dist/$ASSET/README.md"
          tar -czf "dist/$ASSET.tar.gz" -C "dist/$ASSET" agent-gate README.md
      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.asset }}
          path: dist/${{ matrix.asset }}.tar.gz
          if-no-files-found: error

  release:
    name: Publish release
    needs:
      - tag
      - build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true
      - name: Generate checksums
        run: |
          cd dist
          sha256sum *.tar.gz > checksums.txt
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.tag.outputs.tag }}
        run: |
          gh release create "$TAG" dist/*.tar.gz dist/checksums.txt \
            --target "$GITHUB_SHA" \
            --title "agent-gate $TAG" \
            --generate-notes
